<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>강사 포트폴리오 테스트</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Pretendard", "Noto Sans KR", Arial, sans-serif;
      color: #202124;
      background: #f6f7f9;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 20px;
    }

    main {
      width: min(720px, 100%);
      padding: 48px;
      border: 1px solid #d9dde3;
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 18px 40px rgba(32, 33, 36, 0.08);
    }

    .eyebrow {
      margin: 0 0 12px;
      font-size: 14px;
      font-weight: 700;
      color: #0b57d0;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 6vw, 56px);
      line-height: 1.05;
    }

    p {
      margin: 20px 0 0;
      font-size: 18px;
      line-height: 1.7;
      color: #4b5563;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 32px;
      padding: 10px 14px;
      border-radius: 999px;
      background: #e8f0fe;
      color: #174ea6;
      font-size: 14px;
      font-weight: 700;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #34a853;
    }

    @media (max-width: 560px) {
      main {
        padding: 32px 24px;
      }
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">Instructor Portfolio</p>
    <h1>강사 프로필 사이트 준비 중</h1>
    <p>
      이 페이지는 GitHub 저장소와 배포 설정을 확인하기 위한 테스트 페이지입니다.
      추후 강의 분야, 경력, 수업 자료, 문의 정보를 담은 포트폴리오로 확장할 예정입니다.
    </p>
    <div class="status">
      <span class="dot" aria-hidden="true"></span>
      배포 테스트용 페이지
    </div>
  </main>
</body>
</html>
